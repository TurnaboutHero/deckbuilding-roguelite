name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm ci:sim
      - run: pnpm build
      # P5.5/P5.6 릴리스 게이트 (차단)
      - run: pnpm check:content
      - run: pnpm check:assets
      - run: node scripts/check-budget.mjs
      # report-only — 경제 소표본 (실패해도 차단 안 함)
      - run: npx tsx tools/sim/src/economy-report.ts --games 5 > economy-smoke.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: economy-smoke
          path: economy-smoke.json

  playtest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm --filter @game/ui exec playwright install --with-deps chromium
      - run: pnpm -F @game/ui build
      - run: pnpm check:feedback-regression
      - run: pnpm -F @game/ui playtest -- ../../playtest-artifacts
      # P5.5: 접근성 대비 게이트 (차단)
      - run: node apps/ui/scripts/a11y-contrast.mjs contrast-report.json
        working-directory: .
      # P5.6: 성능 게이트 (차단: LCP≤2500ms·CLS≤0.1·>100ms 롱태스크 0)
      - run: node apps/ui/scripts/perf-check.mjs perf-report.json
        working-directory: .
      - uses: actions/upload-artifact@v4
        with:
          name: contrast-report
          path: contrast-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: perf-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playtest-artifacts
          path: playtest-artifacts
          if-no-files-found: ignore
